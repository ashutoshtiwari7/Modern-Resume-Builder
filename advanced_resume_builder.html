<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Advanced Resume Builder</title>

  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Roboto:wght@400;700&family=Open+Sans:wght@400;700&family=Merriweather:wght@400;700&family=Playfair+Display:wght@400;700&family=Montserrat:wght@400;700&family=Poppins:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css" />
  <link rel="stylesheet" href="css/styles.css" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="dark">
<div class="wrap" id="appWrap">

  <div class="toolbar">
    <span class="tb-label">Font:</span>
    <select class="tb-select" id="fontPicker" onchange="changeFont(this.value)">
      <option value="Poppins">Poppins</option>
      <option value="Roboto">Roboto</option>
      <option value="Open Sans">Open Sans</option>
      <option value="Montserrat">Montserrat</option>
      <option value="Lato">Lato</option>
      <option value="Merriweather">Merriweather</option>
      <option value="Playfair Display">Playfair Display</option>
    </select>
    <div class="tb-sep"></div>
    <span class="tb-label">Accent:</span>
    <input type="color" id="accentColor" value="#5ba4cf"
      style="background:transparent;width:28px;height:28px;border:1px solid var(--border);border-radius:4px;cursor:pointer;padding:1px"
      onchange="changeAccent(this.value)" />
    <div class="tb-sep"></div>
    <button class="tb-btn" type="button" onclick="toggleTemplatesGrid(true)">
      <i class="ti ti-layout-grid"></i> <span class="tb-btn-text">Templates</span>
    </button>
    <div class="tb-sep tb-sep-dl"></div>
    <button class="tb-btn primary" onclick="downloadPDF()">
      <i class="ti ti-download"></i> <span class="tb-btn-text">Download PDF</span>
    </button>
    <button class="darkmode-toggle" id="darkModeToggle" type="button" onclick="toggleDark()">
      <i class="fa-solid fa-moon" id="darkModeIcon"></i>
      <span id="darkModeText">Light mode</span>
    </button>
  </div>

  <div class="sidebar-toggle-wrap" id="sidebarToggleWrap">
    <button class="sidebar-toggle" id="sidebarToggle" type="button" onclick="toggleSidebar()" aria-label="Toggle sidebar">
      <i class="fa-solid fa-bars"></i>
    </button>
  </div>

  <div class="body">
    <div class="editor" id="editorSidebar">
      <div class="etabs">
        <button class="etab on" onclick="etab('profile', this)">Profile</button>
        <button class="etab" onclick="etab('work', this)">Work</button>
        <button class="etab" onclick="etab('edu', this)">Edu</button>
        <button class="etab" onclick="etab('skills', this)">Skills</button>
        <button class="etab" onclick="etab('personal', this)">Info</button>
        <button class="etab" onclick="etab('sections', this)">+ Add</button>
      </div>

      <div id="ep-profile" class="epane on">
        <span class="slbl">Photo</span>
        <div class="photo-box" id="photoBox">
          <input type="file" accept="image/*" onchange="handlePhoto(event)" id="photoInput" />
          <i class="ti ti-upload" style="font-size:20px;color:var(--accent)"></i>
          <span>Click to upload photo</span>
        </div>
        <div id="photoControls" style="display:none">
          <div id="photoThumbFrame" class="photo-thumb-frame" title="Drag to reposition photo">
            <img id="photoThumb" class="photo-thumb-img" alt="Profile photo preview" />
          </div>
          <p class="photo-thumb-hint">Drag photo to adjust position (matches resume)</p>
          <div class="img-ctrl"><label>Size</label><input type="range" min="40" max="140" value="78" id="photoSize" oninput="updatePhotoSize()"><span id="photoSizeVal">78px</span></div>
          <div class="img-ctrl"><label>Zoom</label><input type="range" min="100" max="300" value="100" id="photoZoom" oninput="updatePhotoZoom()"><span id="photoZoomVal">100%</span></div>
          <div class="img-ctrl"><label>Left/Right</label><input type="range" min="-80" max="80" value="0" id="photoOffsetX" oninput="updatePhotoOffset()"><span id="photoOffsetXVal">0</span></div>
          <div class="img-ctrl"><label>Up/Down</label><input type="range" min="-80" max="80" value="0" id="photoOffsetY" oninput="updatePhotoOffset()"><span id="photoOffsetYVal">0</span></div>
          <button class="tb-btn danger" style="width:100%;margin-top:6px;justify-content:center" onclick="removePhoto()">
            <i class="ti ti-trash"></i> Remove photo
          </button>
        </div>
        <div class="fg" style="margin-top:10px">
          <label>First Name</label>
          <input id="fn" placeholder="First Name" value="First Name" oninput="update()" />
        </div>
        <div class="fg">
          <label>Last Name</label>
          <input id="ln" placeholder="Last Name" value="Last Name" oninput="update()" />
        </div>
        <div class="fg">
          <label>Job Title / Tagline</label>
          <input id="tagline" placeholder="e.g. Software Developer" oninput="update()" />
        </div>
        <div class="fg">
          <label>Phone</label>
          <input id="phone" placeholder="+91-0000000000" oninput="update()" />
        </div>
        <div class="fg">
          <label>Email</label>
          <input id="email" placeholder="youremail@domain.com" oninput="update()" />
        </div>
        <div class="fg">
          <label>LinkedIn / Website</label>
          <input id="website" placeholder="linkedin.com/in/yourname" oninput="update()" />
        </div>
        <div class="fg">
          <label>GitHub</label>
          <input id="github" placeholder="github.com/yourname" oninput="update()" />
        </div>
        <div class="fg">
          <label>Portfolio</label>
          <input id="portfolio" placeholder="yourportfolio.com" oninput="update()" />
        </div>
        <div class="fg">
          <label>Summary</label>
          <textarea id="summary" placeholder="Your professional summary..." oninput="update()"></textarea>
        </div>
        <span class="slbl" style="margin-top:4px">Hobbies</span>
        <div id="hobbies-editor"></div>
        <button class="add-btn" onclick="addHobby()"><i class="ti ti-plus"></i> Add hobby</button>
      </div>

      <div id="ep-work" class="epane">
        <span class="slbl">Work Experience</span>
        <div id="work-editor"></div>
        <button class="add-btn" onclick="addWork()"><i class="ti ti-plus"></i> Add experience</button>
      </div>

      <div id="ep-edu" class="epane">
        <span class="slbl">Education</span>
        <div id="edu-editor"></div>
        <button class="add-btn" onclick="addEdu()"><i class="ti ti-plus"></i> Add education</button>
      </div>

      <div id="ep-skills" class="epane">
        <span class="slbl">Skills</span>
        <div id="skills-editor"></div>
        <button class="add-btn" onclick="addSkill()"><i class="ti ti-plus"></i> Add skill</button>
      </div>

      <div id="ep-personal" class="epane">
        <span class="slbl">Personal Info</span>
        <div class="fg"><label>Father's Name</label><input id="father" placeholder="Father's Name" oninput="update()" /></div>
        <div class="fg"><label>Date of Birth</label><input id="dob" placeholder="DD/MM/YYYY" oninput="update()" /></div>
        <div class="fg"><label>Gender</label><input id="gender" placeholder="Gender" oninput="update()" /></div>
        <div class="fg"><label>Language(s)</label><input id="lang" placeholder="Hindi, English" oninput="update()" /></div>
        <div class="fg"><label>Marital Status</label><input id="marital" placeholder="Married / Unmarried" oninput="update()" /></div>
        <div class="fg"><label>Nationality</label><input id="nation" placeholder="Indian" oninput="update()" /></div>
        <div class="fg">
          <label>Declaration</label>
          <textarea id="decl" oninput="update()" style="min-height:50px">I hereby declare that the above given information is true to the best of my knowledge and belief.</textarea>
        </div>
      </div>

      <div id="ep-sections" class="epane">
        <span class="slbl">Add a section</span>
        <p class="presetSection">Pick a preset section type or create a custom one. Sections appear in the main resume area.</p>
        <div class="section-picker">
          <button class="sp-btn" onclick="addSection('languages')"><i class="ti ti-language"></i> Languages</button>
          <button class="sp-btn" onclick="addSection('certifications')"><i class="ti ti-certificate"></i> Certifications</button>
          <button class="sp-btn" onclick="addSection('projects')"><i class="ti ti-code"></i> Projects</button>
          <button class="sp-btn" onclick="addSection('awards')"><i class="ti ti-trophy"></i> Awards</button>
          <button class="sp-btn" onclick="addSection('volunteering')"><i class="ti ti-heart"></i> Volunteering</button>
          <button class="sp-btn" onclick="addSection('references')"><i class="ti ti-users"></i> References</button>
          <button class="sp-btn" onclick="addSection('custom')"><i class="ti ti-plus"></i> Custom</button>
        </div>
        <span class="slbl" style="margin-top:14px">Manage sections</span>
        <div id="custom-sections-editor"></div>
      </div>
    </div>

    <div class="preview" id="previewArea">
      <div id="templates-overlay">
        <div class="template-grid-header">
          <div class="template-grid-title"><label>🎨 Choose a Template</label></div>
          <button class="tb-btn" type="button" onclick="toggleTemplatesGrid()">✕ Close</button>
        </div>
        <div id="template-grid" class="template-grid"></div>
      </div>

      <div class="resume-scale-wrap" id="resumeScaleWrap">
        <div id="resumeEl" style="font-family: var(--font)"></div>
      </div>
    </div>
  </div>
</div>

<script src="templates/helpers.js"></script>
<script src="templates/t1_classic_sidebar.js"></script>
<script src="templates/t2_minimalist_top.js"></script>
<script src="templates/t3_executive_bold.js"></script>
<script src="templates/t4_elegant_timeline.js"></script>
<script src="templates/t5_tech_modern.js"></script>
<script src="templates/t6_compact_fresher.js"></script>
<script src="templates/t7_corporate_grid.js"></script>
<script src="templates/tr1_emily_classic.js"></script>
<script src="templates/tr2_elena_ats.js"></script>
<script src="templates/tr3_olivia_centered.js"></script>
<script src="templates/tr4_jackson_photocenter.js"></script>
<script src="templates/tr5_elise_bold_left.js"></script>
<script src="templates/tr6_alexander_minimal.js"></script>
<script src="templates/tr7_brad_twocol.js"></script>
<script src="templates/index.js"></script>
<script src="js/app.js"></script>
</body>
</html>
